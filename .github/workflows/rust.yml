name: Rust

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: cargo build --release --verbose
    
    - name: Run tests
      run: cargo test --verbose

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release_package
        Copy-Item -Path "target/release/focus-timer-rust.exe" -Destination "release_package/"
        Copy-Item -Path "assets" -Destination "release_package/" -Recurse
        Compress-Archive -Path "release_package/*" -DestinationPath "focus-timer-rust-windows.zip"

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: focus-timer-rust-windows.zip
