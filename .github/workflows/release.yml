name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from Cargo.toml
        id: extract
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.extract.outputs.version }}" > /dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: cargo build --release 
    
    - name: Run tests
      run: cargo test

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release_package
        Copy-Item -Path "target/release/focus-timer-rust.exe" -Destination "release_package/"
        Copy-Item -Path "assets" -Destination "release_package/" -Recurse
        Compress-Archive -Path "release_package/*" -DestinationPath "focus-timer-rust-windows.zip"

    - name: Build Installer
      run: iscc "/DMyAppVersion=${{ needs.check-version.outputs.version }}" installer.iss

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifacts
        path: |
          focus-timer-rust-windows.zip
          Output/FocusTimerRust-Setup.exe

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build
      run: cargo build --release
      
    - name: Run tests
      run: cargo test

    - name: Package
      run: |
        mkdir -p release_package
        cp target/release/focus-timer-rust release_package/
        cp -r assets release_package/
        
        # Create a simple .app bundle structure (optional but better for Mac users)
        mkdir -p "Focus Timer.app/Contents/MacOS"
        mkdir -p "Focus Timer.app/Contents/Resources"
        cp target/release/focus-timer-rust "Focus Timer.app/Contents/MacOS/"
        cp -r assets/* "Focus Timer.app/Contents/Resources/"
        
        # Create Info.plist
        cat > "Focus Timer.app/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>focus-timer-rust</string>
            <key>CFBundleIdentifier</key>
            <string>com.focustimer.rust</string>
            <key>CFBundleName</key>
            <string>Focus Timer</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Zip the .app bundle
        zip -r focus-timer-rust-macos.zip "Focus Timer.app"

    - name: Upload MacOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-artifacts
        path: focus-timer-rust-macos.zip

  publish-release:
    needs: [check-version, build-windows, build-macos]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" release-artifacts/* --title "Release v${{ needs.check-version.outputs.version }}"
