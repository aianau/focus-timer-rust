[package]
name = "focus-timer-rust"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { version = "0.5", features = ["desktop", "hooks"] }
dioxus-logger = "0.5"
notify-rust = "4.11.7"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tauri-winrt-notification = "0.7.2"
tokio = { version = "1.48.0", features = ["full"] }
tracing = "0.1"
